<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUTOCAD IA | Preview Beta</title>
  <style>
    :root{color-scheme:dark;--bg:#07110d;--panel:rgba(13,21,18,.92);--soft:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);--text:#edf6f1;--muted:#9eb0a7;--accent:#1dd774;--danger:#ff8f8f}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:"Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,#09130f,#050907);color:var(--text)}
    .app{width:min(1320px,calc(100vw - 32px));margin:0 auto;padding:24px 0 32px;display:grid;gap:18px}
    .hero,.panel{border:1px solid var(--border);border-radius:24px;background:var(--panel);box-shadow:0 24px 52px rgba(0,0,0,.24);backdrop-filter:blur(18px)}
    .hero,.panel{padding:18px} .hero h1,.panel h2{margin:0 0 10px;letter-spacing:-.04em} .hero p,.muted,.meta span,.floor-head span,.legend-item span,.insight-card span,.feedback{color:var(--muted);line-height:1.6}
    .main{display:grid;grid-template-columns:minmax(340px,430px) minmax(0,1fr);gap:18px}
    .actions,.toolbar,.meta-grid,.legend-grid{display:flex;flex-wrap:wrap;gap:10px}
    button{min-height:46px;padding:0 16px;border:1px solid var(--border);border-radius:14px;background:var(--soft);color:var(--text);font-weight:700;cursor:pointer}
    button.primary{border-color:transparent;background:var(--accent);color:#042112} button.is-active{background:rgba(29,215,116,.12);border-color:rgba(29,215,116,.22)}
    textarea{width:100%;min-height:360px;padding:14px;border:1px solid var(--border);border-radius:18px;background:rgba(255,255,255,.03);color:var(--text);resize:vertical;font:14px/1.6 Consolas,"Courier New",monospace}
    .meta-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr))} .meta,.floor,.legend-item,.insight-card{padding:12px 14px;border-radius:18px;border:1px solid var(--border);background:rgba(255,255,255,.03)}
    .meta span{display:block;font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px} .meta strong{font-size:1rem}
    .floors,.legend-col,.insight-col{display:grid;gap:12px} .floor-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:10px}
    .canvas{position:relative;min-height:380px;border:1px solid var(--border);border-radius:20px;overflow:hidden;background:#0b1511}
    .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:40px 40px;opacity:.9;pointer-events:none}
    .grid.hidden{display:none} .stage{position:relative;min-height:380px;overflow:auto;padding:16px} .viewport{transform-origin:top left} .empty{display:grid;place-items:center;min-height:260px;text-align:center;color:var(--muted)}
    svg{display:block;width:100%;height:auto} .room-label,.room-meta,.dimension-label{text-anchor:middle;dominant-baseline:middle}.room-label{font-weight:700;fill:#f2f7f4}.room-meta,.dimension-label{fill:#afc0b8}
    .legend-wrap{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(260px,.8fr);gap:14px} .legend-item{display:grid;grid-template-columns:auto minmax(0,1fr);gap:10px;align-items:start}
    .swatch{width:14px;height:14px;border-radius:999px;margin-top:4px;border:1px solid rgba(255,255,255,.1)}
    @media (max-width:1120px){.meta-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.legend-wrap{grid-template-columns:1fr}}
    @media (max-width:920px){.main{grid-template-columns:1fr}.canvas,.stage{min-height:320px}}
    @media (max-width:640px){.app{width:min(100vw - 20px,1320px);padding-top:12px}.hero,.panel{border-radius:20px}.meta-grid{grid-template-columns:1fr}.actions,.toolbar{display:grid}button{width:100%}}
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>AUTOCAD IA Preview</h1>
      <p>Beta local para validar plantas maiores, com mais ambientes e mais de um pavimento.</p>
    </section>
    <section class="main">
      <article class="panel">
        <h2>Entrada</h2>
        <div class="actions">
          <button class="primary" id="renderButton" type="button">Renderizar planta</button>
          <button id="sampleJsonButton" type="button">JSON exemplo</button>
          <button id="sampleTextButton" type="button">Texto simples</button>
          <button id="sampleMansionButton" type="button">Texto mansao</button>
          <button id="downloadJsonButton" type="button">Baixar JSON</button>
          <button id="clearButton" type="button">Limpar</button>
        </div>
        <textarea id="projectInput" spellcheck="false"></textarea>
        <p class="feedback" id="feedback">Cole um JSON estruturado ou descreva o projeto.</p>
      </article>
      <article class="panel">
        <div class="toolbar">
          <button class="is-active" id="toggleGridButton" type="button">Grade</button>
          <button class="is-active" id="toggleLabelsButton" type="button">Labels</button>
          <button id="zoomOutButton" type="button">Zoom -</button>
          <button id="zoomInButton" type="button">Zoom +</button>
          <button id="resetZoomButton" type="button">Reset</button>
        </div>
        <div class="meta-grid" style="margin-top:12px">
          <div class="meta"><span>Titulo</span><strong id="metaTitle">-</strong></div>
          <div class="meta"><span>Tipo</span><strong id="metaType">-</strong></div>
          <div class="meta"><span>Dimensoes</span><strong id="metaDimensions">-</strong></div>
          <div class="meta"><span>Pavimentos</span><strong id="metaFloors">-</strong></div>
          <div class="meta"><span>Area interna</span><strong id="metaArea">-</strong></div>
        </div>
        <div class="floors" id="floorsContainer" style="margin-top:14px"><div class="empty">Renderize um projeto para visualizar a planta.</div></div>
        <div class="legend-wrap" style="margin-top:14px">
          <div class="legend-col"><h2>Ambientes</h2><div id="roomLegend"></div></div>
          <div class="insight-col"><h2>Insights</h2><div id="insightList"></div></div>
        </div>
      </article>
    </section>
  </main>
  <script>
    const sampleJson=`{"title":"Casa beta 120 m2","project_type":"casa","floors":1,"width":12,"depth":10,"wall_thickness":0.15,"rooms":[{"name":"Sala","width":4,"depth":5,"category":"social","level":0},{"name":"Cozinha","width":3,"depth":3,"category":"social","level":0},{"name":"Quarto 1","width":3,"depth":3.5,"category":"private","level":0},{"name":"Banheiro","width":2,"depth":2,"category":"private","level":0}]}`;
    const sampleText="casa terrea 12x8 com sala 4x5, cozinha 3x3, quarto 3x3 e banheiro 2x2";
    const sampleMansion="Quero uma mansao de 2 andares em um terreno de 30x40. No terreo quero sala de estar 8x7, sala de jantar 5x5, cozinha gourmet 6x5, escritorio 4x4, lavabo 2x2, lavanderia 4x3, deposito 3x2, espaco gourmet 8x4, garagem 8x6 e piscina 10x4. No pavimento superior quero 4 suites grandes, sendo uma suite master 7x6 com closet 3x3 e banheiro 3x3, mais sala intima 5x4 e varanda 8x2.";
    const ROOM_LIBRARY={"sala de estar":{aliases:["sala de estar"],size:[6,5],category:"social"},"sala de jantar":{aliases:["sala de jantar","jantar"],size:[5,4],category:"social"},"sala intima":{aliases:["sala intima","sala de tv"],size:[4.5,4],category:"social"},"cozinha gourmet":{aliases:["cozinha gourmet"],size:[6,5],category:"social"},"cozinha":{aliases:["cozinha"],size:[4,3.5],category:"social"},"despensa":{aliases:["despensa"],size:[2,2],category:"service"},"lavabo":{aliases:["lavabo"],size:[2,1.8],category:"service"},"escritorio":{aliases:["escritorio"],size:[4,3.5],category:"social"},"area de servico":{aliases:["area de servico"],size:[3.5,3],category:"service"},"lavanderia":{aliases:["lavanderia"],size:[3.5,3],category:"service"},"deposito":{aliases:["deposito"],size:[2.5,2],category:"service"},"espaco gourmet":{aliases:["espaco gourmet","varanda gourmet"],size:[7,4],category:"leisure"},"varanda":{aliases:["varanda"],size:[6,2.5],category:"leisure"},"garagem":{aliases:["garagem"],size:[7.5,6],category:"garage"},"piscina":{aliases:["piscina"],size:[8,4],category:"external"},"suite master":{aliases:["suite master"],size:[7,6],category:"private"},"suite":{aliases:["suite"],size:[4.5,4],category:"private"},"quarto":{aliases:["quarto"],size:[3.5,3.5],category:"private"},"closet":{aliases:["closet"],size:[3,2.5],category:"private"},"banheiro":{aliases:["banheiro"],size:[2.4,2.2],category:"private"}};
    const CATEGORY_ORDER={0:["social","service","leisure","garage","external","private"],1:["private","social","leisure","service","garage","external"]};
    const PRIVATE_TOKENS=["suite","quarto","dormitorio"];
    const COLORS=["rgba(29,215,116,.16)","rgba(59,164,255,.16)","rgba(255,196,72,.16)","rgba(218,123,255,.16)","rgba(255,119,119,.16)"];
    const DIM_RE=/(\d+(?:[.,]\d+)?)\s*x\s*(\d+(?:[.,]\d+)?)/i;
    const QTY_RE=/(\d+)\s+(suites?|quartos?|banheiros?)/gi;
    const input=document.getElementById("projectInput"),feedback=document.getElementById("feedback"),floorsContainer=document.getElementById("floorsContainer"),roomLegend=document.getElementById("roomLegend"),insightList=document.getElementById("insightList");
    let currentProject=null,currentScale=1,showGrid=true,showLabels=true;
    const toFloat=(v)=>Number(String(v).replace(",",".")); const norm=(v)=>String(v||"").trim().toLowerCase().replace(/\s+/g," "); const titleCase=(v)=>{const t=String(v||"").trim();return t?t.charAt(0).toUpperCase()+t.slice(1):"Ambiente"};
    function detectProjectType(lower){if(lower.includes("mansao"))return"mansao";if(lower.includes("galpao"))return"galpao";if(lower.includes("predio")||lower.includes("edificio"))return"predio";if(lower.includes("apartamento"))return"apartamento";if(lower.includes("sobrado"))return"sobrado";if(lower.includes("casa"))return"casa";return"residencial"}
    function detectFloors(lower){if(["3 andares","tres andares","3 pavimentos","tres pavimentos"].some((t)=>lower.includes(t)))return 3;if(["2 andares","dois andares","2 pavimentos","dois pavimentos","sobrado"].some((t)=>lower.includes(t)))return 2;return 1}
    function roomLevel(category,level,floors){if(floors<=1)return 0;if(level>0)return Math.min(level,floors-1);if(category==="private")return 1;return 0}
    function canonicalRoom(fragment){const lowered=norm(fragment);for(const [key,cfg] of Object.entries(ROOM_LIBRARY)){if(cfg.aliases.some((alias)=>lowered.includes(alias)))return key}return null}
    function sectionLevel(index,text,floors){if(floors<=1)return 0;const lower=text.toLowerCase();const map={0:["terreo","pavimento terreo"],1:["pavimento superior","andar superior","segundo andar","segundo pavimento"],2:["terceiro andar","terceiro pavimento"]};let best=0,bestDistance=null;for(const [level,markers] of Object.entries(map)){for(const marker of markers){const at=lower.lastIndexOf(marker,index);if(at<0)continue;const dist=index-at;if(bestDistance===null||dist<bestDistance){bestDistance=dist;best=Number(level)}}}return best}
    function buildRoom(name,width,depth,floors,level){const cfg=ROOM_LIBRARY[name];return{name:titleCase(name),width,depth,category:cfg.category,level:roomLevel(cfg.category,level,floors),x:0,y:0}}
    function parseRooms(text,floors){const aliases=Object.values(ROOM_LIBRARY).flatMap((cfg)=>cfg.aliases).sort((a,b)=>b.length-a.length);const aliasPattern=aliases.map((a)=>a.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|");const explicit=new RegExp(`(${aliasPattern})(?:\\s+de)?\\s+(\\d+(?:[.,]\\d+)?)\\s*x\\s*(\\d+(?:[.,]\\d+)?)`,"gi");const rooms=[];for(const match of text.matchAll(explicit)){const key=canonicalRoom(match[1]);if(!key)continue;rooms.push(buildRoom(key,toFloat(match[2]),toFloat(match[3]),floors,sectionLevel(match.index||0,text,floors)))}const names=new Set(rooms.map((room)=>room.name.toLowerCase()));for(const match of text.matchAll(QTY_RE)){const qty=Number(match[1]);const raw=norm(match[2]);const key=raw.includes("suite")?"suite":raw.includes("quarto")?"quarto":"banheiro";const cfg=ROOM_LIBRARY[key];for(let i=0;i<qty;i+=1){const base=titleCase(key);const name=qty>1?`${base} ${i+1}`:base;if(names.has(name.toLowerCase()))continue;const room=buildRoom(key,cfg.size[0],cfg.size[1],floors,sectionLevel(match.index||0,text,floors));room.name=name;rooms.push(room);names.add(name.toLowerCase())}}const lowered=text.toLowerCase();for(const [key,cfg] of Object.entries(ROOM_LIBRARY)){if(["suite","quarto","banheiro"].includes(key))continue;if(!cfg.aliases.some((alias)=>lowered.includes(alias)))continue;const pretty=titleCase(key);if(names.has(pretty.toLowerCase()))continue;rooms.push(buildRoom(key,cfg.size[0],cfg.size[1],floors,0));names.add(pretty.toLowerCase())}return rooms}
    function parseProject(raw){const value=String(raw||"").trim();if(!value)throw new Error("Cole um JSON estruturado ou descreva o projeto.");if(value.startsWith("{")){const parsed=JSON.parse(value);parsed.floors=Number(parsed.floors||1);parsed.rooms=Array.isArray(parsed.rooms)?parsed.rooms.map((room)=>({name:String(room.name||"Ambiente"),width:Number(room.width||3),depth:Number(room.depth||3),category:String(room.category||"social"),level:Number(room.level||0),x:0,y:0})):[];return parsed}const normalized=value.replace(/\s+/g," ");const lower=normalized.toLowerCase();const floors=detectFloors(lower);let width=12,depth=8;const dim=normalized.match(DIM_RE);if(dim){width=toFloat(dim[1]);depth=toFloat(dim[2])}const rooms=parseRooms(normalized,floors);if(!rooms.length){rooms.push({name:"Sala",width:4,depth:5,category:"social",level:0,x:0,y:0},{name:"Cozinha",width:3,depth:3,category:"social",level:0,x:0,y:0},{name:"Quarto",width:3,depth:3.5,category:"private",level:floors>1?1:0,x:0,y:0},{name:"Banheiro",width:2,depth:2,category:"private",level:floors>1?1:0,x:0,y:0})}return{title:`Projeto beta - ${detectProjectType(lower)}`,project_type:detectProjectType(lower),floors,width,depth,wall_thickness:.15,rooms,notes:normalized}}
    function hasStair(rooms){return rooms.some((room)=>String(room.name||"").toLowerCase().includes("escada"))}
    function injectStairs(project,rooms){if(project.floors<=1||hasStair(rooms))return rooms;const next=[...rooms];for(let level=0;level<project.floors;level+=1){next.push({name:"Escada",width:3.2,depth:4.2,category:"service",level,x:0,y:0,color:"rgba(255,255,255,.08)"})}return next}
    function hasCirculation(rooms,level){return rooms.some((room)=>room.level===level&&["hall","circulacao","corredor"].some((token)=>String(room.name||"").toLowerCase().includes(token)))}
    function injectCirculation(project,rooms){const next=[...rooms];for(let level=0;level<project.floors;level+=1){const privateCount=next.filter((room)=>room.level===level&&isPrivateAnchor(room)).length;if(privateCount<2||hasCirculation(next,level))continue;next.push({name:"Hall",width:2.2,depth:4.2,category:"service",level,x:0,y:0,color:"rgba(112,164,255,.12)"})}return next}
    function isPrivateAnchor(room){const lowered=String(room.name||"").toLowerCase();return PRIVATE_TOKENS.some((token)=>lowered.includes(token))}
    function isBath(room){const lowered=String(room.name||"").toLowerCase();return lowered.includes("banheiro")||lowered.includes("wc")}
    function isCloset(room){return String(room.name||"").toLowerCase().includes("closet")}
    function layoutGeneric(project,rooms,startY,preferredStartX=0){let cursorX=preferredStartX,cursorY=startY,rowDepth=0;const laid=[];for(const room of rooms){const current={...room};if(cursorX+current.width>project.width&&cursorX>preferredStartX){cursorX=0;cursorY+=rowDepth+.3;rowDepth=0}current.x=cursorX;current.y=cursorY;cursorX+=current.width+.3;rowDepth=Math.max(rowDepth,current.depth);laid.push(current)}return{rooms:laid,nextY:cursorY+rowDepth+.3}}
    function socialRank(room){const lowered=String(room.name||"").toLowerCase();if(lowered.includes("sala de estar")||lowered.startsWith("sala"))return[0,lowered];if(lowered.includes("jantar"))return[1,lowered];if(lowered.includes("cozinha"))return[2,lowered];return[3,lowered]}
    function layoutSocial(project,rooms,startY,level){const ordered=[...rooms].sort((a,b)=>{const ra=socialRank(a),rb=socialRank(b);return ra[0]-rb[0]||ra[1].localeCompare(rb[1])});const anchors=ordered.slice(0,3),leftovers=ordered.slice(3);if(anchors.length<3)return layoutGeneric(project,ordered,startY);const [first,second,third]=anchors;const laid=[{...first,level,x:0,y:startY},{...second,level,x:first.width+.3,y:startY},{...third,level,x:first.width+.3,y:startY+second.depth+.3}];let nextY=startY+Math.max(first.depth,second.depth+.3+third.depth)+.3;if(leftovers.length){const extra=layoutGeneric(project,leftovers,nextY);laid.push(...extra.rooms);nextY=extra.nextY}return{rooms:laid,nextY}}
    function layoutPrivate(project,rooms,startY,level){const anchors=rooms.filter(isPrivateAnchor);const closets=rooms.filter(isCloset);const baths=rooms.filter(isBath);const leftovers=rooms.filter((room)=>!anchors.includes(room)&&!closets.includes(room)&&!baths.includes(room));if(!anchors.length)return layoutGeneric(project,rooms,startY);const freeClosets=[...closets],freeBaths=[...baths],laid=[];let cursorX=0,cursorY=startY,rowDepth=0;for(const anchor of anchors){const stack=[];if(freeClosets.length)stack.push(freeClosets.shift());if(freeBaths.length)stack.push(freeBaths.shift());const stackWidth=stack.length?Math.max(...stack.map((room)=>room.width)):0;const stackDepth=stack.reduce((sum,room)=>sum+room.depth,0)+(Math.max(stack.length-1,0)*.3);const clusterWidth=anchor.width+(stack.length?stackWidth+.3:0);const clusterDepth=Math.max(anchor.depth,stackDepth);if(cursorX+clusterWidth>project.width&&cursorX>0){cursorX=0;cursorY+=rowDepth+.3;rowDepth=0}laid.push({...anchor,level,x:cursorX,y:cursorY});let stackY=cursorY;for(const room of stack){laid.push({...room,level,x:cursorX+anchor.width+.3,y:stackY});stackY+=room.depth+.3}cursorX+=clusterWidth+.3;rowDepth=Math.max(rowDepth,clusterDepth)}let nextY=cursorY+rowDepth+.3;const remainder=[...leftovers,...freeClosets,...freeBaths];if(remainder.length){const extra=layoutGeneric(project,remainder,nextY);laid.push(...extra.rooms);nextY=extra.nextY}return{rooms:laid,nextY}}
    function layoutProject(project){const next={...project,floors:Math.max(Number(project.floors||1),1),width:Number(project.width||12),depth:Number(project.depth||8),wall_thickness:Number(project.wall_thickness||.15),rooms:Array.isArray(project.rooms)?project.rooms.map((room,index)=>({name:String(room.name||"Ambiente"),width:Number(room.width||3),depth:Number(room.depth||3),category:String(room.category||"social"),level:Number(room.level||0),x:0,y:0,color:COLORS[index%COLORS.length]})):[]};next.rooms=injectStairs(next,next.rooms);next.rooms=injectCirculation(next,next.rooms);const laid=[];const maxLevel=Math.max(next.floors-1,...next.rooms.map((room)=>room.level));for(let level=0;level<=maxLevel;level+=1){const levelRooms=next.rooms.filter((room)=>room.level===level);let cursorY=0;for(const category of (CATEGORY_ORDER[level]||CATEGORY_ORDER[0])){const categoryRooms=levelRooms.filter((room)=>room.category===category);if(!categoryRooms.length)continue;let result;if(category==="private"){result=layoutPrivate(next,categoryRooms,cursorY,level)}else if(category==="social"){result=layoutSocial(next,categoryRooms,cursorY,level)}else{const preferredStartX=category==="service"&&categoryRooms.some((room)=>["escada","hall","circulacao","corredor"].some((token)=>String(room.name||"").toLowerCase().includes(token)))?Math.max((next.width*.5)-1.8,0):0;result=layoutGeneric(next,categoryRooms,cursorY,preferredStartX)}laid.push(...result.rooms);cursorY=result.nextY}}next.rooms=laid.map((room,index)=>({...room,color:room.color||COLORS[index%COLORS.length]}));return next}
    const area=(v)=>`${Number(v).toFixed(2)} m2`;
    function setFeedback(message,isError=false){feedback.textContent=message;feedback.classList.toggle("is-error",isError)}
    function setMeta(project){const total=project.rooms.reduce((sum,room)=>sum+(room.width*room.depth),0);document.getElementById("metaTitle").textContent=project.title||"-";document.getElementById("metaType").textContent=project.project_type||"-";document.getElementById("metaDimensions").textContent=`${project.width}m x ${project.depth}m`;document.getElementById("metaFloors").textContent=`${project.floors} pavimento(s)`;document.getElementById("metaArea").textContent=area(total)}
    function renderLegend(project){roomLegend.innerHTML=project.rooms.map((room)=>`<article class="legend-item"><span class="swatch" style="background:${room.color};"></span><div><strong>${room.name}</strong><span>Pavimento ${room.level+1} - ${room.width}m x ${room.depth}m - ${area(room.width*room.depth)}</span></div></article>`).join("")}
    function renderInsights(project){const total=project.rooms.reduce((sum,room)=>sum+(room.width*room.depth),0);const largest=[...project.rooms].sort((a,b)=>(b.width*b.depth)-(a.width*a.depth))[0];const privateCount=project.rooms.filter((room)=>room.category==="private").length;const leisureCount=project.rooms.filter((room)=>room.category==="leisure"||room.category==="external").length;const stairCount=project.rooms.filter((room)=>String(room.name||"").toLowerCase().includes("escada")).length;insightList.innerHTML=`<article class="insight-card"><strong>Maior ambiente</strong><span>${largest?`${largest.name} com ${area(largest.width*largest.depth)}`:"-"}</span></article><article class="insight-card"><strong>Programa privado</strong><span>${privateCount} ambiente(s) de area intima nesta composicao beta.</span></article><article class="insight-card"><strong>Lazer e apoio</strong><span>${leisureCount} ambiente(s) de lazer, varanda, piscina ou apoio externo.</span></article><article class="insight-card"><strong>Nucleo vertical</strong><span>${stairCount?`${stairCount} modulo(s) de escada distribuido(s) entre os pavimentos.`:"Sem escada dedicada nesta configuracao."}</span></article><article class="insight-card"><strong>Area total</strong><span>${area(total)} de ambientes internos modelados nesta etapa.</span></article>`}
    function roomLabels(room){if(!showLabels)return"";const cx=room.x+(room.width/2)+1;const cy=room.y+(room.depth/2)+1;const titleSize=Math.max(Math.min(room.width,room.depth)*.18,.16);const metaSize=Math.max(titleSize*.62,.11);const areaSize=Math.max(titleSize*.5,.1);return`<text class="room-label" x="${cx}" y="${cy-(metaSize*.7)}" font-size="${titleSize}">${room.name}</text><text class="room-meta" x="${cx}" y="${cy+(metaSize*1.1)}" font-size="${metaSize}">${room.width} x ${room.depth} m</text><text class="dimension-label" x="${cx}" y="${room.y+room.depth+1.08}" font-size="${areaSize}">${area(room.width*room.depth)}</text>`}
    function fakeDoor(room){const lowered=String(room.name||"").toLowerCase(),w=Math.min(.9,Math.max(.75,room.width*.24)),x=room.x+1,y=room.y+1;if(["hall","circulacao","corredor"].some((token)=>lowered.includes(token))){const hingeY=y+(room.depth/2)-(w/2);return`<g opacity=".92"><line x1="${x}" y1="${hingeY}" x2="${x}" y2="${hingeY+w}" stroke="#07110d" stroke-width=".06" /><path d="M ${x} ${hingeY} A ${w} ${w} 0 0 1 ${x+w} ${hingeY+w}" fill="none" stroke="rgba(246,181,77,.95)" stroke-width=".03" /></g>`}if(["garagem","piscina","varanda","espaco gourmet"].some((token)=>lowered.includes(token))){const hingeX=x+(room.width/2)-(w/2);return`<g opacity=".92"><line x1="${hingeX}" y1="${y}" x2="${hingeX+w}" y2="${y}" stroke="#07110d" stroke-width=".06" /><path d="M ${hingeX+w} ${y} A ${w} ${w} 0 0 1 ${hingeX} ${y+w}" fill="none" stroke="rgba(246,181,77,.95)" stroke-width=".03" /></g>`}const hingeX=x+(room.width/2)-(w/2),hingeY=y+room.depth;return`<g opacity=".92"><line x1="${hingeX}" y1="${hingeY}" x2="${hingeX+w}" y2="${hingeY}" stroke="#07110d" stroke-width=".06" /><path d="M ${hingeX} ${hingeY} A ${w} ${w} 0 0 1 ${hingeX+w} ${hingeY-w}" fill="none" stroke="rgba(246,181,77,.95)" stroke-width=".03" /></g>`}
    function fakeWindows(room,project){const span=Math.min(1.4,Math.max(.9,room.width*.28));const x=room.x+1,y=room.y+1;const walls=[];const midX=x+(room.width/2),midY=y+(room.depth/2);if(room.category==="external"||room.category==="leisure"||room.category==="garage"||room.y<=.02){walls.push(`<line x1="${midX-(span/2)}" y1="${y+.08}" x2="${midX+(span/2)}" y2="${y+.08}" stroke="#68a8ff" stroke-width=".06" />`)}if((room.category==="private"||room.category==="social")&&(room.x+room.width)>=project.width-.02){walls.push(`<line x1="${x+room.width-.08}" y1="${midY-(span/2)}" x2="${x+room.width-.08}" y2="${midY+(span/2)}" stroke="#68a8ff" stroke-width=".06" />`)}if((room.category==="social"||room.category==="leisure")&&(room.y+room.depth)>=project.depth-.75){walls.push(`<line x1="${midX-(span/2)}" y1="${y+room.depth-.08}" x2="${midX+(span/2)}" y2="${y+room.depth-.08}" stroke="#68a8ff" stroke-width=".06" />`)}return walls.join("")}
    function fakeStair(room){if(!String(room.name||"").toLowerCase().includes("escada"))return"";const x=room.x+1,y=room.y+1,steps=Math.max(Math.floor(room.depth/.28),8),tread=room.depth/steps;const lines=[];for(let index=1;index<steps;index+=1){const sy=y+(index*tread);lines.push(`<line x1="${x+.16}" y1="${sy}" x2="${x+room.width-.16}" y2="${sy}" stroke="rgba(255,255,255,.52)" stroke-width=".03" />`)}return`<g>${lines.join("")}<text x="${x+(room.width*.34)}" y="${y+(room.depth*.55)}" font-size=".18" fill="#f6b54d">UP</text></g>`}
    function fixtureMarkup(room){const lowered=String(room.name||"").toLowerCase();const x=room.x+1,y=room.y+1,cx=x+(room.width/2),cy=y+(room.depth/2);if(lowered.includes("banheiro")||lowered.includes("wc")||lowered.includes("lavabo")){return`<g><circle cx="${x+.45}" cy="${y+.45}" r=".18" fill="none" stroke="#7ef0a7" stroke-width=".04" /><rect x="${x+room.width-.75}" y="${y+.35}" width=".5" height=".5" fill="none" stroke="#68a8ff" stroke-width=".04" /></g>`}if(lowered.includes("cozinha")){return`<g><line x1="${x+.3}" y1="${y+.35}" x2="${x+room.width-.3}" y2="${y+.35}" stroke="#f6b54d" stroke-width=".05" /><line x1="${x+.3}" y1="${y+.85}" x2="${x+room.width-.3}" y2="${y+.85}" stroke="#f6b54d" stroke-width=".05" /><circle cx="${cx}" cy="${y+.58}" r=".12" fill="none" stroke="#ff8f8f" stroke-width=".04" /></g>`}if(lowered.includes("hall")||lowered.includes("circulacao")||lowered.includes("corredor")){return`<text x="${cx-.45}" y="${cy}" font-size=".16" fill="#68a8ff">CIRC</text>`}return""}
    function furnitureMarkup(room){const lowered=String(room.name||"").toLowerCase();const x=room.x+1,y=room.y+1;if(lowered.includes("sala")&&!lowered.includes("jantar")){return`<g><rect x="${x+.35}" y="${y+.4}" width="${Math.min(1.6,Math.max(room.width-.7,.4))}" height=".6" fill="none" stroke="#d692ff" stroke-width=".04" /><rect x="${x+.45}" y="${y+room.depth-1}" width="${Math.min(.75,Math.max(room.width-.9,.3))}" height=".45" fill="none" stroke="#d692ff" stroke-width=".04" /></g>`}if(lowered.includes("jantar")){return`<g><circle cx="${x+Math.min(room.width*.5,1.6)}" cy="${y+Math.min(room.depth*.5,1.5)}" r=".5" fill="none" stroke="#f6b54d" stroke-width=".04" /><circle cx="${x+.6}" cy="${y+.65}" r=".14" fill="none" stroke="#f6b54d" stroke-width=".04" /><circle cx="${x+room.width-.6}" cy="${y+.65}" r=".14" fill="none" stroke="#f6b54d" stroke-width=".04" /><circle cx="${x+.6}" cy="${y+room.depth-.65}" r=".14" fill="none" stroke="#f6b54d" stroke-width=".04" /><circle cx="${x+room.width-.6}" cy="${y+room.depth-.65}" r=".14" fill="none" stroke="#f6b54d" stroke-width=".04" /></g>`}if(lowered.includes("suite")||lowered.includes("quarto")){return`<g><rect x="${x+.35}" y="${y+.35}" width="${Math.min(2.1,Math.max(room.width-.7,.4))}" height="${Math.min(1.5,Math.max(room.depth-.7,.4))}" fill="none" stroke="#ff8f8f" stroke-width=".04" /><rect x="${x+.45}" y="${y+.45}" width="${Math.min(.45,Math.max(room.width-.9,.2))}" height="${Math.min(1.3,Math.max(room.depth-.9,.2))}" fill="none" stroke="#ff8f8f" stroke-width=".04" /></g>`}if(lowered.includes("garagem")){const first=`<rect x="${x+.5}" y="${y+.55}" width="${Math.min(2.1,Math.max(room.width-1,.8))}" height="${Math.min(3.9,Math.max(room.depth-1.1,.9))}" fill="none" stroke="#68a8ff" stroke-width=".04" />`;const second=room.width>5.2?`<rect x="${x+room.width-2.6}" y="${y+.55}" width="${Math.min(2.1,Math.max(room.width-1,.8))}" height="${Math.min(3.9,Math.max(room.depth-1.1,.9))}" fill="none" stroke="#68a8ff" stroke-width=".04" />`:"";return`<g>${first}${second}</g>`}if(lowered.includes("piscina")){return`<rect x="${x+.35}" y="${y+.35}" width="${Math.max(room.width-.7,.8)}" height="${Math.max(room.depth-.7,.8)}" fill="rgba(64,164,255,.12)" stroke="#68a8ff" stroke-width=".04" />`}return""}
    function siteOutline(project,rooms){if(!rooms.length)return"";const minX=Math.min(...rooms.map((room)=>room.x)),minY=Math.min(...rooms.map((room)=>room.y)),maxX=Math.max(...rooms.map((room)=>room.x+room.width)),maxY=Math.max(...rooms.map((room)=>room.y+room.depth)),margin=.8,notch=Math.min(1.4,Math.max((maxX-minX)*.12,.9));const p1=`${minX+1-margin},${minY+1-margin}`,p2=`${maxX+1+margin},${minY+1-margin}`,p3=`${maxX+1+margin},${maxY+1+margin}`,p4=`${minX+1+notch},${maxY+1+margin}`,p5=`${minX+1-margin},${maxY+1-notch}`;return`<polyline points="${p1} ${p2} ${p3} ${p4} ${p5} ${p1}" fill="none" stroke="rgba(29,215,116,.55)" stroke-width=".06" />`}
    function siteAccessMarkup(rooms){if(!rooms.length)return"";const garage=rooms.find((room)=>String(room.name||"").toLowerCase().includes("garagem"));const living=rooms.find((room)=>String(room.name||"").toLowerCase().includes("sala")&&!String(room.name||"").toLowerCase().includes("jantar"));const parts=[];if(garage){const x=garage.x+1,y=garage.y+1,left=x+.35,right=x+garage.width-.35,street=y-2;parts.push(`<line x1="${left}" y1="${y}" x2="${left-.6}" y2="${street}" stroke="rgba(246,181,77,.8)" stroke-width=".06" />`);parts.push(`<line x1="${right}" y1="${y}" x2="${right+.6}" y2="${street}" stroke="rgba(246,181,77,.8)" stroke-width=".06" />`);parts.push(`<line x1="${left-.6}" y1="${street}" x2="${right+.6}" y2="${street}" stroke="rgba(246,181,77,.8)" stroke-width=".06" />`)}if(living){const x=living.x+1,y=living.y+1,pathX=x+(living.width*.5);parts.push(`<line x1="${pathX-.45}" y1="${y}" x2="${pathX-.25}" y2="${y-1.35}" stroke="rgba(29,215,116,.85)" stroke-width=".05" />`);parts.push(`<line x1="${pathX+.45}" y1="${y}" x2="${pathX+.25}" y2="${y-1.35}" stroke="rgba(29,215,116,.85)" stroke-width=".05" />`);parts.push(`<line x1="${pathX-.25}" y1="${y-1.35}" x2="${pathX+.25}" y2="${y-1.35}" stroke="rgba(29,215,116,.85)" stroke-width=".05" />`)}[[0.85,0.15],[3.0,-0.05],[5.2,0.1]].forEach(([tx,ty])=>{parts.push(`<circle cx="${tx}" cy="${ty}" r=".22" fill="none" stroke="rgba(29,215,116,.7)" stroke-width=".04" />`);parts.push(`<circle cx="${tx+.2}" cy="${ty+.08}" r=".16" fill="none" stroke="rgba(29,215,116,.7)" stroke-width=".04" />`)});return parts.join("")}
    function renderFloor(project,level){const rooms=project.rooms.filter((room)=>room.level===level);if(!rooms.length)return"";const maxDepth=Math.max(project.depth||1,...rooms.map((room)=>room.y+room.depth+.7));const viewWidth=project.width+2.4,viewHeight=maxDepth+2.2;const floorArea=rooms.reduce((sum,room)=>sum+(room.width*room.depth),0);const floorLabel=level===0?"Terreo":`Pavimento ${level+1}`;const roomMarkup=rooms.map((room)=>`<g><rect x="${room.x+1}" y="${room.y+1}" width="${room.width}" height="${room.depth}" fill="${room.color}" stroke="none" /><rect x="${room.x+1}" y="${room.y+1}" width="${room.width}" height="${room.depth}" fill="none" stroke="#dcefe5" stroke-width="${Math.max(project.wall_thickness*.45,.04)}" /><rect x="${room.x+1.08}" y="${room.y+1.08}" width="${Math.max(room.width-.16,.2)}" height="${Math.max(room.depth-.16,.2)}" fill="none" stroke="rgba(255,255,255,.18)" stroke-width=".03" />${fakeWindows(room,project)}${fakeDoor(room)}${fakeStair(room)}${fixtureMarkup(room)}${furnitureMarkup(room)}${roomLabels(room)}</g>`).join("");return`<article class="floor"><div class="floor-head"><div><strong>${floorLabel}</strong><span>${rooms.length} ambiente(s)</span></div><span>${area(floorArea)}</span></div><div class="canvas"><div class="grid${showGrid?"":" hidden"}"></div><div class="stage"><div class="viewport" style="transform:scale(${currentScale});"><svg viewBox="0 0 ${viewWidth} ${viewHeight}" preserveAspectRatio="xMidYMid meet" aria-label="${floorLabel}"><rect x="0" y="0" width="${viewWidth}" height="${viewHeight}" fill="#0b1511"></rect>${level===0?siteOutline(project,rooms):""}${level===0?siteAccessMarkup(rooms):""}<rect x=".75" y=".75" width="${project.width+.5}" height="${maxDepth+.35}" fill="none" stroke="rgba(255,255,255,.16)" stroke-width=".04" stroke-dasharray=".16 .1"></rect><text x="1" y=".42" fill="#8ea198" font-size=".16">${project.title} - ${floorLabel}</text>${roomMarkup}</svg></div></div></div></article>`}
    function resetPreview(){currentProject=null;floorsContainer.innerHTML='<div class="empty">Renderize um projeto para visualizar a planta.</div>';roomLegend.innerHTML="";insightList.innerHTML="";document.getElementById("metaTitle").textContent="-";document.getElementById("metaType").textContent="-";document.getElementById("metaDimensions").textContent="-";document.getElementById("metaFloors").textContent="-";document.getElementById("metaArea").textContent="-"}
    function renderProject(){try{const project=layoutProject(parseProject(input.value));currentProject=project;setMeta(project);renderLegend(project);renderInsights(project);const maxLevel=Math.max(project.floors-1,...project.rooms.map((room)=>room.level));floorsContainer.innerHTML=Array.from({length:maxLevel+1},(_,level)=>renderFloor(project,level)).join("");setFeedback("Preview gerado com sucesso.")}catch(error){resetPreview();setFeedback(error.message||"Nao foi possivel renderizar o preview.",true)}}
    function downloadJson(){if(!currentProject){setFeedback("Renderize um projeto antes de baixar o JSON.",true);return}const blob=new Blob([JSON.stringify(currentProject,null,2)],{type:"application/json"});const link=document.createElement("a");link.href=URL.createObjectURL(blob);link.download="autocad-ia-preview.json";link.click();URL.revokeObjectURL(link.href);setFeedback("JSON do preview baixado com sucesso.")}
    document.getElementById("renderButton").addEventListener("click",renderProject);
    document.getElementById("sampleJsonButton").addEventListener("click",()=>{input.value=sampleJson;renderProject()});
    document.getElementById("sampleTextButton").addEventListener("click",()=>{input.value=sampleText;renderProject()});
    document.getElementById("sampleMansionButton").addEventListener("click",()=>{input.value=sampleMansion;renderProject()});
    document.getElementById("downloadJsonButton").addEventListener("click",downloadJson);
    document.getElementById("clearButton").addEventListener("click",()=>{input.value="";resetPreview();setFeedback("Cole um JSON estruturado ou descreva o projeto.")});
    document.getElementById("toggleGridButton").addEventListener("click",(event)=>{showGrid=!showGrid;event.currentTarget.classList.toggle("is-active",showGrid);if(currentProject)renderProject()});
    document.getElementById("toggleLabelsButton").addEventListener("click",(event)=>{showLabels=!showLabels;event.currentTarget.classList.toggle("is-active",showLabels);if(currentProject)renderProject()});
    document.getElementById("zoomInButton").addEventListener("click",()=>{currentScale=Math.min(currentScale+.12,2.1);if(currentProject)renderProject()});
    document.getElementById("zoomOutButton").addEventListener("click",()=>{currentScale=Math.max(currentScale-.12,.7);if(currentProject)renderProject()});
    document.getElementById("resetZoomButton").addEventListener("click",()=>{currentScale=1;if(currentProject)renderProject()});
    input.value=sampleMansion;renderProject();
  </script>
