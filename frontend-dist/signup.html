<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotai | Criar conta</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="stylesheet" href="./assets/css/apex.css" />
  <style>
    :root {
      --auth-bg: #090d12;
      --auth-bg-soft: #0d1218;
      --auth-panel: rgba(13, 17, 23, 0.9);
      --auth-line: rgba(255, 255, 255, 0.08);
      --auth-text: #f7f8fb;
      --auth-muted: #94a3b8;
      --auth-green: #22c55e;
      --auth-green-strong: #39e079;
      --auth-shadow: 0 28px 70px rgba(0, 0, 0, 0.36);
    }

    body[data-page="signup"] {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at top center, rgba(34, 197, 94, 0.12), transparent 28%),
        linear-gradient(180deg, var(--auth-bg), var(--auth-bg-soft));
      color: var(--auth-text);
    }

    .auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-card {
      width: min(100%, 460px);
      padding: 32px;
      border: 1px solid var(--auth-line);
      border-radius: 28px;
      background: var(--auth-panel);
      box-shadow: var(--auth-shadow);
    }

    .auth-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      color: inherit;
      text-decoration: none;
      font-size: 1.18rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .auth-brand-mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(180deg, var(--auth-green-strong), var(--auth-green));
      color: #031109;
      font-weight: 900;
    }

    .auth-copy {
      display: grid;
      gap: 10px;
      margin-bottom: 28px;
    }

    .auth-copy span {
      color: var(--auth-green);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .auth-copy h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 2.6rem);
      line-height: 1.04;
      letter-spacing: -0.06em;
    }

    .auth-copy p {
      margin: 0;
      color: var(--auth-muted);
      line-height: 1.65;
    }

    .auth-form {
      display: grid;
      gap: 16px;
    }

    .auth-field {
      display: grid;
      gap: 8px;
    }

    .auth-field label {
      color: var(--auth-text);
      font-size: 0.94rem;
      font-weight: 600;
    }

    .auth-field input {
      min-height: 52px;
      padding: 0 16px;
      border: 1px solid var(--auth-line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--auth-text);
      outline: none;
      transition:
        border-color var(--transition-base),
        box-shadow var(--transition-base),
        background-color var(--transition-base);
    }

    .auth-field input::placeholder {
      color: #6f7b8b;
    }

    .auth-field input:focus {
      border-color: rgba(34, 197, 94, 0.28);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.08);
      background: rgba(255, 255, 255, 0.04);
    }

    .auth-feedback {
      margin: 0;
      color: #fca5a5;
      font-size: 0.94rem;
      line-height: 1.5;
    }

    .auth-actions {
      display: grid;
      gap: 12px;
      margin-top: 6px;
    }

    .auth-links {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
      color: var(--auth-muted);
      font-size: 0.94rem;
      flex-wrap: wrap;
    }

    .auth-links a {
      color: inherit;
      text-decoration: none;
    }

    .auth-links a:hover {
      color: var(--auth-text);
    }

    @media (max-width: 560px) {
      .auth-card {
        padding: 24px;
        border-radius: 24px;
      }

      .auth-links {
        flex-direction: column;
      }
    }
  </style>
</head>
<body data-page="signup">
  <main class="auth-page">
    <section class="auth-card">
      <a class="auth-brand" href="index.html">
        <span class="auth-brand-mark">C</span>
        <span>Cotai</span>
      </a>

      <div class="auth-copy">
        <span>Cadastro</span>
        <h1>Crie a conta da sua empresa.</h1>
        <p>Comece com uma base simples para organizar pedidos, cotacoes e compras em um fluxo mais claro.</p>
      </div>

      <form class="auth-form" id="signupForm">
        <div class="auth-field">
          <label for="companyName">Empresa</label>
          <input id="companyName" name="company_name" type="text" placeholder="Construtora Alfa" required />
        </div>

        <div class="auth-field">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" placeholder="voce@empresa.com" autocomplete="email" required />
        </div>

        <div class="auth-field">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" placeholder="Minimo de 6 caracteres" autocomplete="new-password" required />
        </div>

        <div class="auth-field">
          <label for="confirmPassword">Confirmar senha</label>
          <input id="confirmPassword" name="confirm_password" type="password" placeholder="Repita a senha" autocomplete="new-password" required />
        </div>

        <p class="auth-feedback hidden" id="signupFeedback" role="alert"></p>

        <div class="auth-actions">
          <button class="btn btn-primary w-full" id="signupSubmit" type="submit">Criar conta</button>
          <a class="btn btn-ghost w-full" href="login.html">Ja tenho conta</a>
        </div>
      </form>

      <div class="auth-links">
        <a href="index.html">Voltar para o site</a>
        <a href="login.html">Entrar</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./assets/js/pages/signup.page.js"></script>
</body>
</html>
