<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060a09" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cotai" />
  <title>Cotai | Alertas</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="stylesheet" href="./assets/css/apex.css" />
</head>
<body data-page="alerts">
  <div class="app-shell app-layout dashboard-apex-layout">
    <aside class="sidebar app-sidebar dashboard-apex-sidebar" id="appSidebar"></aside>
    <button class="app-drawer-overlay" id="appDrawerOverlay" type="button" aria-label="Fechar menu"></button>
    <main class="app-main dashboard-apex-main">
      <header class="app-topbar">
        <div>
          <p class="eyebrow">Overview</p>
          <h1>Alertas</h1>
          <p id="alertsTitle">Monitoramento da operacao.</p>
        </div>
        <div class="app-topbar-actions">
          <button class="btn btn-ghost" id="sidebarToggle" type="button">Menu</button>
          <button class="btn btn-ghost" id="logoutButton" type="button">Sair</button>
        </div>
      </header>
      <p class="app-feedback hidden" id="alertsFeedback" role="alert"></p>

      <section class="card empty-state-card empty-state-card-centered">
        <div class="empty-state-icon" aria-hidden="true"><i class="bx bx-bell-off"></i></div>
        <div class="empty-state-copy">
          <h2>Sem alertas</h2>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./assets/js/pages/alerts.page.js"></script>
</body>
</html>
