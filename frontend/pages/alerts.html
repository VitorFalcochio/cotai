<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotai | Alertas</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="stylesheet" href="../assets/css/apex.css" />
</head>
<body data-page="alerts">
  <div class="app-shell app-layout dashboard-apex-layout">
    <aside class="sidebar app-sidebar dashboard-apex-sidebar" id="appSidebar"></aside>
    <button class="app-drawer-overlay" id="appDrawerOverlay" type="button" aria-label="Fechar menu"></button>
    <main class="app-main dashboard-apex-main">
      <header class="app-topbar">
        <div>
          <p class="eyebrow">Overview</p>
          <h1>Alertas</h1>
          <p id="alertsTitle">Sinais criticos da operacao.</p>
        </div>
        <div class="app-topbar-actions">
          <button class="btn btn-ghost" id="sidebarToggle" type="button">Menu</button>
          <button class="btn btn-ghost" id="logoutButton" type="button">Sair</button>
        </div>
      </header>
      <p class="app-feedback hidden" id="alertsFeedback" role="alert"></p>
      <section class="app-metrics">
        <article class="card app-metric-card"><p>Total de alertas</p><h3 id="alertsCount">0</h3></article>
        <article class="card app-metric-card"><p>Aprovacoes pendentes</p><h3 id="alertsApprovals">0</h3></article>
        <article class="card app-metric-card"><p>Erros operacionais</p><h3 id="alertsErrors">0</h3></article>
      </section>
      <section class="card table-shell">
        <div class="filter-shell-head"><div><p class="eyebrow">Fila critica</p><h2>O que precisa de atencao agora</h2></div></div>
        <div id="alertsList" class="admin-status-stack"></div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="../assets/js/pages/alerts.page.js"></script>
</body>
</html>
