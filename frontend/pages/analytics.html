<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotai | Analytics</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="stylesheet" href="../assets/css/apex.css" />
</head>
<body data-page="analytics">
  <div class="app-shell app-layout dashboard-apex-layout">
    <aside class="sidebar app-sidebar dashboard-apex-sidebar" id="appSidebar"></aside>
    <button class="app-drawer-overlay" id="appDrawerOverlay" type="button" aria-label="Fechar menu"></button>
    <main class="app-main dashboard-apex-main">
      <header class="app-topbar">
        <div>
          <p class="eyebrow">Overview</p>
          <h1>Analytics</h1>
          <p id="analyticsTitle">Leitura de performance operacional.</p>
        </div>
        <div class="app-topbar-actions">
          <button class="btn btn-ghost" id="sidebarToggle" type="button">Menu</button>
          <button class="btn btn-ghost" id="logoutButton" type="button">Sair</button>
        </div>
      </header>
      <p class="app-feedback hidden" id="analyticsFeedback" role="alert"></p>
      <section class="app-metrics">
        <article class="card app-metric-card"><p>Economia estimada</p><h3 id="analyticsSavings">R$ 0</h3></article>
        <article class="card app-metric-card"><p>Tempo poupado</p><h3 id="analyticsTime">0h</h3></article>
        <article class="card app-metric-card"><p>Fornecedores consultados</p><h3 id="analyticsSuppliers">0</h3></article>
        <article class="card app-metric-card"><p>Materiais cotados</p><h3 id="analyticsMaterials">0</h3></article>
      </section>
      <section class="admin-dual-panel">
        <article class="card table-shell">
          <div class="filter-shell-head"><div><p class="eyebrow">Materiais</p><h2>Mais recorrentes</h2></div></div>
          <div id="analyticsTopMaterials" class="admin-status-stack"></div>
        </article>
        <article class="card table-shell">
          <div class="filter-shell-head"><div><p class="eyebrow">Fornecedores</p><h2>Maior participacao</h2></div></div>
          <div id="analyticsTopSuppliers" class="admin-status-stack"></div>
        </article>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="../assets/js/pages/analytics.page.js"></script>
</body>
</html>
