<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotai | Aprovacoes</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="stylesheet" href="../assets/css/apex.css" />
</head>
<body data-page="approvals">
  <div class="app-shell app-layout dashboard-apex-layout">
    <aside class="sidebar app-sidebar dashboard-apex-sidebar" id="appSidebar"></aside>
    <button class="app-drawer-overlay" id="appDrawerOverlay" type="button" aria-label="Fechar menu"></button>
    <main class="app-main dashboard-apex-main">
      <header class="app-topbar">
        <div>
          <p class="eyebrow">Procurement</p>
          <h1>Aprovacoes</h1>
          <p id="approvalsTitle">Pedidos aguardando decisao.</p>
        </div>
        <div class="app-topbar-actions">
          <button class="btn btn-ghost" id="sidebarToggle" type="button">Menu</button>
          <button class="btn btn-ghost" id="logoutButton" type="button">Sair</button>
        </div>
      </header>
      <p class="app-feedback hidden" id="approvalsFeedback" role="alert"></p>
      <section class="app-metrics">
        <article class="card app-metric-card"><p>Pedidos pendentes</p><h3 id="approvalsCount">0</h3></article>
        <article class="card app-metric-card"><p>Economia potencial</p><h3 id="approvalsSavings">R$ 0</h3></article>
      </section>
      <section class="card table-shell">
        <div class="filter-shell-head"><div><p class="eyebrow">Fila</p><h2>Pedidos que esperam aprovacao</h2></div></div>
        <div class="app-table-wrap">
          <table class="app-table">
            <thead><tr><th>Pedido</th><th>Cliente</th><th>Economia</th><th>Criado em</th><th>Acao</th></tr></thead>
            <tbody id="approvalsTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="../assets/js/pages/approvals.page.js"></script>
</body>
</html>
