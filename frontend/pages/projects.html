<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060a09" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cotai" />
  <title>Cotai | Projetos</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" />
  <link rel="stylesheet" href="../assets/css/apex.css" />
  <style>
    .projects-shell {
      display: grid;
      gap: 18px;
    }

    .projects-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 8px;
    }

    .projects-header h1 {
      margin: 0 0 6px;
      font-size: 1.75rem;
      letter-spacing: -0.04em;
    }

    .projects-header p {
      margin: 0;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .projects-minimal-stats {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--text-muted);
      font-size: 0.84rem;
    }

    .projects-minimal-stats span {
      padding: 6px 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.02);
    }

    .projects-board {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      background: rgba(14, 16, 20, 0.92);
      overflow: hidden;
    }

    .projects-board-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .projects-search {
      position: relative;
      width: min(420px, 100%);
    }

    .projects-search i {
      position: absolute;
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.05rem;
      pointer-events: none;
    }

    .projects-search input {
      width: 100%;
      height: 46px;
      padding: 0 14px 0 42px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-primary);
      outline: none;
    }

    .projects-search input::placeholder {
      color: var(--text-muted);
    }

    .projects-toolbar-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .projects-toolbar-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-secondary);
      font-size: 0.86rem;
    }

    .projects-toolbar-chip strong {
      color: var(--text-primary);
    }

    .projects-table-wrap {
      padding: 12px 16px 16px;
    }

    .projects-table {
      width: 100%;
      border-collapse: collapse;
    }

    .projects-table thead th {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
      font-size: 0.77rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-align: left;
      text-transform: uppercase;
    }

    .projects-table tbody tr {
      transition: background-color var(--transition-base);
    }

    .projects-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.025);
    }

    .projects-table td {
      padding: 18px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      vertical-align: middle;
    }

    .projects-col-index {
      width: 56px;
      color: var(--text-muted);
    }

    .projects-col-status {
      width: 138px;
    }

    .projects-col-action {
      width: 168px;
    }

    .projects-name-cell {
      display: grid;
      gap: 4px;
    }

    .projects-name-cell strong {
      line-height: 1.45;
      font-size: 1.02rem;
    }

    .projects-name-cell span,
    .projects-inline-meta,
    .projects-empty-cell {
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .projects-inline-meta {
      font-size: 0.92rem;
    }

    .projects-status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 108px;
      padding: 7px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-primary);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .projects-status-pill.is-active {
      border-color: rgba(25, 210, 107, 0.2);
      background: rgba(25, 210, 107, 0.12);
      color: #9df0bb;
    }

    .projects-status-pill.is-pending {
      border-color: rgba(249, 191, 36, 0.2);
      background: rgba(249, 191, 36, 0.12);
      color: #ffd978;
    }

    .projects-status-pill.is-done {
      border-color: rgba(47, 140, 255, 0.2);
      background: rgba(47, 140, 255, 0.12);
      color: #8ec5ff;
    }

    .projects-action-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: var(--text-primary);
      text-decoration: none;
      transition: background-color var(--transition-base), border-color var(--transition-base);
    }

    .projects-action-link:hover {
      border-color: rgba(25, 210, 107, 0.18);
      background: rgba(25, 210, 107, 0.06);
    }

    .projects-action-link.is-disabled {
      opacity: 0.55;
      pointer-events: none;
    }

    .projects-empty-cell {
      padding: 24px 16px;
    }

    @media (max-width: 768px) {
      .projects-header,
      .projects-board-toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .projects-shell {
        gap: 16px;
      }

      .projects-header {
        gap: 14px;
      }

      .projects-header h1 {
        font-size: clamp(1.9rem, 10vw, 2.4rem);
      }

      .projects-minimal-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .projects-search {
        width: 100%;
      }

      .projects-toolbar-meta {
        width: 100%;
        justify-content: flex-start;
      }

      .projects-board {
        padding: 16px;
      }

      .projects-table-wrap {
        margin-inline: -4px;
      }

      .projects-name-cell strong {
        font-size: 0.98rem;
      }

      .projects-inline-meta {
        font-size: 0.88rem;
      }

      .projects-status-pill {
        min-width: 0;
      }
    }

    @media (max-width: 760px) {
      .projects-table thead {
        display: none;
      }

      .projects-table,
      .projects-table tbody,
      .projects-table tr,
      .projects-table td {
        display: block;
        width: 100%;
      }

      .projects-table tbody tr {
        display: grid;
        gap: 10px;
        padding: 16px 14px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.02);
      }

      .projects-table td {
        padding: 0;
        border-bottom: 0;
      }

      .projects-table td[data-label]::before {
        content: attr(data-label);
        display: block;
        margin-bottom: 4px;
        color: var(--text-muted);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .projects-table tbody tr:not(:last-child) {
        margin-bottom: 10px;
      }

      .projects-col-index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        min-width: 34px;
        height: 34px;
        padding-top: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-primary);
      }

      .projects-col-index::before {
        margin-bottom: 0;
      }

      .projects-col-action .projects-action-link,
      .projects-col-action .projects-action-link.is-disabled {
        width: 100%;
        justify-content: center;
      }

      .projects-status-pill {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .projects-minimal-stats {
        grid-template-columns: 1fr;
      }

      .projects-toolbar-meta {
        flex-direction: column;
        align-items: stretch;
      }

      .projects-toolbar-chip {
        width: 100%;
        justify-content: space-between;
      }

      .projects-board {
        padding: 14px;
      }

      .projects-table tbody tr {
        padding: 14px 12px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body data-page="projects">
  <div class="app-layout dashboard-apex-layout">
    <aside class="app-sidebar dashboard-apex-sidebar" id="appSidebar"></aside>
    <button class="app-drawer-overlay" id="appDrawerOverlay" type="button" aria-label="Fechar menu"></button>

    <main class="app-main dashboard-apex-main">
      <div class="projects-shell">
        <header class="projects-header">
          <div>
            <h1>Projetos</h1>
            <p>Projetos salvos do chat da Cota, com fase, materiais e custo consolidado em uma leitura simples.</p>
          </div>
          <div class="page-actions">
            <button class="btn btn-ghost" id="sidebarToggle" type="button">Menu</button>
            <a class="btn btn-primary" href="new-request.html">
              <i class="bx bx-plus" aria-hidden="true"></i>
              <span>Novo projeto via chat</span>
            </a>
          </div>
        </header>

        <div class="projects-minimal-stats">
          <span><strong id="projectsMetricTotal">0</strong> projetos salvos</span>
          <span><strong id="projectsMetricMaterials">0</strong> materiais monitorados</span>
          <span><strong id="projectsMetricCost">R$ 0</strong> em custo salvo</span>
          <span><strong id="projectsMetricActive">0</strong> em andamento</span>
        </div>

        <p class="app-feedback hidden" id="projectsFeedback" role="alert"></p>

        <section class="projects-board">
          <div class="projects-board-toolbar">
            <label class="projects-search" for="projectsSearch">
              <i class="bx bx-search" aria-hidden="true"></i>
              <input id="projectsSearch" type="search" placeholder="Filtrar projetos salvos..." />
            </label>
            <div class="projects-toolbar-meta">
              <span class="projects-toolbar-chip">Origem: <strong>Chat da Cota</strong></span>
              <span class="projects-toolbar-chip">Exibindo <strong id="projectsVisibleCount">0</strong></span>
            </div>
          </div>

          <div class="projects-table-wrap">
            <table class="projects-table">
              <thead>
                <tr>
                  <th class="projects-col-index">#</th>
                  <th>Projeto</th>
                  <th>Resumo</th>
                  <th>Custo</th>
                  <th class="projects-col-status">Status</th>
                  <th class="projects-col-action">Acoes</th>
                </tr>
              </thead>
              <tbody id="projectsList"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="../assets/js/pages/projects.page.js"></script>
</body>
</html>
