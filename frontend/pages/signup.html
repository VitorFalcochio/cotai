<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotai App | Criar conta</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body data-page="signup">
  <main class="app-login-wrap">
    <section class="card app-login-card">
      <a class="brand" href="index.html">
        <span class="brand-mark">■</span>
        <span class="brand-name">Cotai</span>
      </a>
      <h1>Criar conta</h1>
      <p class="muted">Cadastre sua empresa para acessar o painel.</p>

      <form class="form app-stack-sm" id="signupForm">
        <div class="form-row">
          <label for="companyName">Nome da empresa</label>
          <input id="companyName" name="company_name" type="text" placeholder="Ex: Construtora Alfa" required />
        </div>

        <div class="form-row">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" placeholder="voce@empresa.com" autocomplete="email" required />
        </div>

        <div class="form-row">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" placeholder="Minimo de 6 caracteres" autocomplete="new-password" required />
        </div>

        <div class="form-row">
          <label for="confirmPassword">Confirmar senha</label>
          <input id="confirmPassword" name="confirm_password" type="password" placeholder="Repita a senha" autocomplete="new-password" required />
        </div>

        <p class="app-feedback hidden" id="signupFeedback" role="alert"></p>
        <button class="btn btn-primary w-full" id="signupSubmit" type="submit">Criar conta</button>
      </form>

      <div class="app-login-actions">
        <a class="btn btn-ghost w-full" href="login.html">Ja tenho conta</a>
        <a class="btn btn-ghost w-full" href="index.html">Voltar para landing</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="../assets/js/pages/signup.page.js"></script>
</body>
</html>
