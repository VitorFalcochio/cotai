        <a class="side-link" data-nav="admin-users" href="admin-users.html" title="Users"><span class="left"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></span><span class="nav-label">Users</span></span><span class="mini-badge">Auth</span></a>

        <a class="side-link" data-nav="admin-logs" href="admin-logs.html" title="Logs"><span class="left"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20V10"></path><path d="M18 20V4"></path><path d="M6 20v-4"></path></svg></span><span class="nav-label">Logs</span></span><span class="mini-badge">Audit</span></a>
      </nav>
      <div class="app-sidebar-foot"><a class="btn btn-ghost w-full" href="dashboard.html">Voltar ao cliente</a></div>
    </aside>
    <button class="app-drawer-overlay" id="appDrawerOverlay" type="button" aria-label="Fechar menu"></button>
    <main class="app-main">
      <header class="app-topbar">
        <div><h1>Logs</h1><p class="muted">Auditoria administrativa e eventos do worker com filtros.</p></div>
        <div class="app-topbar-actions">
          <div class="admin-topbar-identity"><strong id="adminIdentity">Admin</strong><span class="app-badge is-success" id="adminRole">ADMIN</span></div>
          <button class="btn btn-ghost" id="sidebarToggle" type="button">Menu</button>
          <button class="btn btn-ghost" id="backToClientButton" type="button">Cliente</button>
          <button class="btn btn-ghost" id="logoutButton" type="button">Sair</button>
        </div>
      </header>
      <p class="app-feedback hidden" id="adminLogsFeedback" role="alert"></p>
      <section class="card">
        <form class="admin-filter-grid" id="adminLogsFilters">
          <div class="form-row"><label for="logStartDate">Data inicial</label><input id="logStartDate" type="date" /></div>
          <div class="form-row"><label for="logEndDate">Data final</label><input id="logEndDate" type="date" /></div>
          <div class="form-row"><label for="logCompanyFilter">Empresa</label><select id="logCompanyFilter"><option value="all">Todas as empresas</option></select></div>
          <div class="form-row"><label for="logTypeFilter">Tipo de evento</label><select id="logTypeFilter"><option value="all">Todos os eventos</option></select></div>
          <div class="form-row admin-filter-submit"><label>&nbsp;</label><button class="btn btn-primary" type="submit">Aplicar filtros</button></div>
        </form>
      </section>
      <section class="card">
        <div class="app-table-wrap">
          <table class="app-table">
            <thead><tr><th>Quando</th><th>Tipo</th><th>Empresa</th><th>Ator</th><th>Mensagem</th></tr></thead>
            <tbody id="adminLogsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="../assets/js/pages/admin-logs.page.js"></script>
