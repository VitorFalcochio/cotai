<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotai App | Login</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body data-page="login">
  <main class="app-login-wrap">
    <section class="card app-login-card">
      <a class="brand" href="index.html">
        <span class="brand-mark">■</span>
        <span class="brand-name">Cotai</span>
      </a>
      <h1>Entrar no painel</h1>
      <p class="muted">Acesse sua operacao e acompanhe os pedidos da sua empresa.</p>

      <form class="form app-stack-sm" id="loginForm">
        <div class="form-row">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" placeholder="voce@empresa.com" autocomplete="email" required />
        </div>

        <div class="form-row">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" placeholder="Digite sua senha" autocomplete="current-password" required />
        </div>

        <p class="app-feedback hidden" id="loginFeedback" role="alert"></p>
        <button class="btn btn-primary w-full" id="loginSubmit" type="submit">Entrar</button>
      </form>

      <div class="app-login-actions">
        <a class="btn btn-ghost w-full" href="signup.html">Criar conta</a>
        <a class="btn btn-ghost w-full" href="index.html">Voltar para landing</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="../assets/js/pages/login.page.js"></script>
</body>
</html>
